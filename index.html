<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Água Diária</title>
    <!-- Ícone da aba do navegador -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥤</text></svg>">
    <!-- Arquivo Manifest para instalar no celular com ícone -->
    <link rel="manifest" href="manifest.json">
    <!-- Biblioteca de Confetes -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --text-color: #333;
            --border-color: #eee;
            --input-bg: #f9f9f9;
        }

        body.dark-mode {
            --primary-color: #5dade2;
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --text-color: #e9e9e9;
            --border-color: #2c3e50;
            --input-bg: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 420px;
            position: relative;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-color);
            padding: 5px;
        }

        .streak-badge {
            background-color: #ff9f43;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 { font-size: 24px; margin-bottom: 5px; }

        .progress-container {
            background-color: var(--border-color);
            border-radius: 15px;
            height: 30px;
            width: 100%;
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            border-radius: 15px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stats {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        button.water-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button.water-btn:active { transform: scale(0.95); }

        /* Input Customizado e Botão Desfazer */
        .custom-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .custom-row input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .custom-row button.add-btn { background-color: #2ecc71; color: white; border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; cursor: pointer; }
        .custom-row button.undo-btn { background-color: #95a5a6; color: white; border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; cursor: pointer; }

        /* Calendário da Semana */
        .history-section {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .history-title { font-size: 14px; color: #7f8c8d; margin-bottom: 15px; font-weight: bold; }
        .history-days { display: flex; justify-content: space-between; align-items: center; }
        
        .day-card { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #7f8c8d; text-transform: capitalize; cursor: pointer; }
        .dot { width: 22px; height: 22px; border-radius: 50%; margin-top: 5px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); border: 2px solid transparent; }
        
        .dot.success { background-color: #2ecc71; }
        .dot.fail { background-color: #e74c3c; }
        .dot.empty { background-color: var(--border-color); }
        .dot.future { background-color: transparent; border: 2px dashed var(--border-color); box-shadow: none; }
        .dot.today { border: 2px solid var(--text-color); }

        .day-info { margin-top: 15px; font-size: 14px; color: var(--primary-color); font-weight: bold; min-height: 20px; }

        /* Botão para abrir o Calendário Mensal */
        .btn-full-calendar {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-full-calendar:hover { background-color: var(--primary-color); color: white; }

        /* Modais (Configuração e Calendário Mensal) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100;
        }

        .modal-content {
            background-color: var(--container-bg); padding: 20px; border-radius: 15px; width: 90%; max-width: 380px; text-align: center; max-height: 90vh; overflow-y: auto;
        }

        .modal-content input { width: 100%; padding: 10px; margin: 15px 0; border-radius: 10px; border: 1px solid var(--border-color); background-color: var(--input-bg); color: var(--text-color); font-size: 16px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px;}
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; }
        .btn-save { background-color: var(--primary-color); }
        .btn-cancel { background-color: #e74c3c; }

        /* Estilos do Calendário Mensal */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-header button { background: none; border: none; font-size: 20px; color: var(--primary-color); cursor: pointer; padding: 5px 15px; font-weight: bold;}
        .cal-header h3 { text-transform: capitalize; margin: 0; font-size: 18px; }
        
        .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; font-size: 12px; color: #7f8c8d; font-weight: bold; margin-bottom: 5px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        
        .cal-cell {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; color: #fff;
        }
        .cal-cell.empty-slot { background: transparent; cursor: default; }
        .cal-cell.cal-success { background-color: #2ecc71; }
        .cal-cell.cal-fail { background-color: #e74c3c; }
        .cal-cell.cal-empty { background-color: var(--border-color); color: var(--text-color); }
        .cal-cell.cal-future { background-color: transparent; border: 1px dashed var(--border-color); color: #7f8c8d; }
        .cal-cell.cal-today { border: 2px solid var(--text-color); }

        .modal-day-info { margin-top: 15px; padding: 10px; border-radius: 10px; background-color: var(--input-bg); font-weight: bold; color: var(--primary-color); min-height: 40px; }

    </style>
</head>
<body>

    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="icon-btn" onclick="toggleDarkMode()" id="dark-btn">🌙</button>
            <button class="icon-btn" onclick="openSettings()">⚙️</button>
        </div>

        <h1>💧 Minha Água</h1>
        <div class="streak-badge" id="streak">🔥 0 dias seguidos</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        
        <div class="stats">
            <span id="current">0</span> ml / <span id="goal-display">4000</span> ml
        </div>

        <div class="buttons">
            <button class="water-btn" onclick="addWater(150)">+ 150ml ☕</button>
            <button class="water-btn" onclick="addWater(250)">+ 250ml 🥛</button>
            <button class="water-btn" onclick="addWater(500)">+ 500ml 🥤</button>
            <button class="water-btn" onclick="addWater(1000)">+ 1 Litro 💧</button>
        </div>

        <div class="custom-row">
            <input type="number" id="custom-amount" placeholder="Outro valor (ml)">
            <button class="add-btn" onclick="addCustomWater()">➕</button>
            <button class="undo-btn" onclick="undoLast()" title="Desfazer">🔙</button>
        </div>

        <!-- Histórico da Semana e Botão do Calendário Mensal -->
        <div class="history-section">
            <div class="history-title">Progresso da Semana</div>
            <div class="history-days" id="history-days"></div>
            <div id="day-info" class="day-info">Toque em um dia para ver os detalhes</div>
            
            <!-- Novo botão -->
            <button class="btn-full-calendar" onclick="openCalendar()">📅 Ver Calendário Completo</button>
        </div>

        <!-- Modal de Configurações -->
        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <h3>⚙️ Configurações</h3>
                <p style="margin-top:10px; font-size:14px;">Defina sua meta diária (ml):</p>
                <input type="number" id="new-goal" placeholder="Ex: 4000">
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closeSettings()">Cancelar</button>
                    <button class="btn-save" onclick="saveSettings()">Salvar</button>
                </div>
            </div>
        </div>

        <!-- Novo Modal: Calendário Mensal -->
        <div class="modal" id="calendar-modal">
            <div class="modal-content">
                <div class="cal-header">
                    <button onclick="prevMonth()">❮</button>
                    <h3 id="cal-month-year">Mês Ano</h3>
                    <button onclick="nextMonth()">❯</button>
                </div>
                
                <div class="cal-weekdays">
                    <div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div><div>Dom</div>
                </div>
                
                <div class="cal-grid" id="cal-grid">
                    <!-- Dias gerados pelo JS -->
                </div>

                <div class="modal-day-info" id="modal-day-info">
                    Toque em um dia acima para ver o consumo.
                </div>

                <button class="btn-cancel" style="width: 100%; margin-top: 15px; padding: 12px; border:none; border-radius:10px; font-weight:bold; color:white;" onclick="closeCalendar()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        let goal = localStorage.getItem('waterGoal') ? parseInt(localStorage.getItem('waterGoal')) : 4000;
        let currentWater = 0;
        let history = {};
        let actionHistory =[];
        let isDarkMode = localStorage.getItem('darkMode') === 'true';

        // Variáveis do Calendário Mensal
        let navMonth = new Date().getMonth();
        let navYear = new Date().getFullYear();

        // Som de água
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playWaterSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        if (isDarkMode) {
            document.body.classList.add('dark-mode');
            document.getElementById('dark-btn').innerText = '☀️';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            isDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDarkMode);
            document.getElementById('dark-btn').innerText = isDarkMode ? '☀️' : '🌙';
        }

        function loadData() {
            const savedWater = localStorage.getItem('waterIntake');
            const savedDate = localStorage.getItem('waterDate');
            const savedHistory = localStorage.getItem('waterHistory');
            const todayKey = new Date().toDateString();

            if (savedHistory) history = JSON.parse(savedHistory);

            if (savedDate !== todayKey) {
                currentWater = 0;
                localStorage.setItem('waterDate', todayKey);
                localStorage.setItem('waterIntake', 0);
                actionHistory =[]; 
            } else if (savedWater) {
                currentWater = parseInt(savedWater);
                const savedActions = localStorage.getItem('actionHistory');
                if(savedActions) actionHistory = JSON.parse(savedActions);
            }
            
            history[todayKey] = currentWater;
            localStorage.setItem('waterHistory', JSON.stringify(history));

            updateUI();
        }

        function updateUI() {
            document.getElementById('current').innerText = currentWater;
            document.getElementById('goal-display').innerText = goal;
            
            let percentage = (currentWater / goal) * 100;
            if (percentage > 100) percentage = 100;
            document.getElementById('progress').style.width = percentage + '%';

            renderWeek();
            calculateStreak();
        }

        function calculateStreak() {
            let streak = 0;
            let d = new Date();
            
            if (currentWater >= goal) streak++;
            
            d.setDate(d.getDate() - 1);
            while (true) {
                let key = d.toDateString();
                if (history[key] >= goal) {
                    streak++;
                    d.setDate(d.getDate() - 1);
                } else {
                    break;
                }
            }
            document.getElementById('streak').innerText = `🔥 ${streak} dias seguidos`;
        }

        function renderWeek() {
            const historyDiv = document.getElementById('history-days');
            historyDiv.innerHTML = ''; 

            let curr = new Date();
            let todayKey = curr.toDateString();
            
            let dayOfWeek = curr.getDay(); 
            let diffToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            
            let monday = new Date(curr);
            monday.setDate(curr.getDate() - diffToMonday);

            for(let i = 0; i < 7; i++) {
                let d = new Date(monday);
                d.setDate(monday.getDate() + i);
                
                let dateKey = d.toDateString();
                let dayName = d.toLocaleDateString('pt-BR', {weekday: 'short'}).substring(0,3);
                let fullDateName = d.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric'});
                
                let dayIntake = history[dateKey] || 0;
                let isGoalMet = dayIntake >= goal;
                let dotClass = 'empty';
                
                if (d.setHours(0,0,0,0) > new Date().setHours(0,0,0,0)) {
                    dotClass = 'future';
                } else {
                    if (dayIntake > 0 && !isGoalMet) dotClass = 'fail';
                    if (isGoalMet) dotClass = 'success';
                }
                
                let todayBorder = dateKey === todayKey ? 'today' : '';

                historyDiv.innerHTML += `
                    <div class="day-card" onclick="showDayInfo('${fullDateName}', ${dayIntake})">
                        <span>${dayName}</span>
                        <div class="dot ${dotClass} ${todayBorder}"></div>
                    </div>
                `;
            }
        }

        function showDayInfo(dateName, intake) {
            const infoDiv = document.getElementById('day-info');
            const formattedDate = dateName.charAt(0).toUpperCase() + dateName.slice(1);
            
            if(intake === 0) {
                infoDiv.innerText = `${formattedDate}: Nenhum registro.`;
                infoDiv.style.color = '#7f8c8d';
            } else if (intake >= goal) {
                infoDiv.innerText = `🎉 ${formattedDate}: ${intake}ml (Meta batida!)`;
                infoDiv.style.color = '#2ecc71';
            } else {
                infoDiv.innerText = `${formattedDate}: ${intake}ml consumidos.`;
                infoDiv.style.color = '#e74c3c';
            }
        }

        function addWater(amount) {
            let wasBelowGoal = currentWater < goal;
            currentWater += amount;
            actionHistory.push(amount);
            
            saveState();
            playWaterSound();

            if (wasBelowGoal && currentWater >= goal) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 1000 });
            }
        }

        function addCustomWater() {
            let input = document.getElementById('custom-amount');
            let amount = parseInt(input.value);
            if(amount > 0) {
                addWater(amount);
                input.value = ''; 
            }
        }

        function undoLast() {
            if(actionHistory.length > 0) {
                let lastAmount = actionHistory.pop();
                currentWater -= lastAmount;
                if(currentWater < 0) currentWater = 0;
                saveState();
                
                // Atualiza o calendário se ele estiver aberto
                if(document.getElementById('calendar-modal').style.display === 'flex'){
                    renderMonthCalendar();
                }
            } else {
                alert("Não há ações para desfazer hoje.");
            }
        }

        function saveState() {
            localStorage.setItem('waterIntake', currentWater);
            localStorage.setItem('actionHistory', JSON.stringify(actionHistory));
            
            let todayKey = new Date().toDateString();
            history[todayKey] = currentWater;
            localStorage.setItem('waterHistory', JSON.stringify(history));

            updateUI();
            let d = new Date();
            let fullDateName = d.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric'});
            showDayInfo(fullDateName, currentWater);
        }

        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            document.getElementById('new-goal').value = goal;
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function saveSettings() {
            let newGoal = parseInt(document.getElementById('new-goal').value);
            if(newGoal > 0) {
                goal = newGoal;
                localStorage.setItem('waterGoal', goal);
                closeSettings();
                updateUI();
            }
        }

        // --- FUNÇÕES DO CALENDÁRIO MENSAL ---
        function openCalendar() {
            document.getElementById('calendar-modal').style.display = 'flex';
            // Abre sempre no mês atual
            navMonth = new Date().getMonth();
            navYear = new Date().getFullYear();
            document.getElementById('modal-day-info').innerText = "Toque em um dia acima para ver o consumo.";
            document.getElementById('modal-day-info').style.color = "var(--primary-color)";
            renderMonthCalendar();
        }

        function closeCalendar() {
            document.getElementById('calendar-modal').style.display = 'none';
        }

        function prevMonth() {
            navMonth--;
            if (navMonth < 0) { navMonth = 11; navYear--; }
            renderMonthCalendar();
        }

        function nextMonth() {
            navMonth++;
            if (navMonth > 11) { navMonth = 0; navYear++; }
            renderMonthCalendar();
        }

        function renderMonthCalendar() {
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            
            const firstDayOfMonth = new Date(navYear, navMonth, 1);
            const daysInMonth = new Date(navYear, navMonth + 1, 0).getDate();
            
            // Título do mês
            let monthName = firstDayOfMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
            document.getElementById('cal-month-year').innerText = monthName;

            // Ajuste para começar na Segunda-feira (0 = Dom, 1 = Seg...)
            let startDay = firstDayOfMonth.getDay();
            let emptySlots = startDay === 0 ? 6 : startDay - 1;

            // Preenche os espaços vazios antes do dia 1
            for(let i = 0; i < emptySlots; i++) {
                grid.innerHTML += `<div class="cal-cell empty-slot"></div>`;
            }

            let today = new Date();
            today.setHours(0,0,0,0);

            // Preenche os dias do mês
            for(let i = 1; i <= daysInMonth; i++) {
                let currentDay = new Date(navYear, navMonth, i);
                let dateKey = currentDay.toDateString();
                
                let intake = history[dateKey] || 0;
                let isGoalMet = intake >= goal;

                let cellClass = 'cal-empty';
                
                if (currentDay > today) {
                    cellClass = 'cal-future';
                } else {
                    if (intake > 0 && !isGoalMet) cellClass = 'cal-fail';
                    if (isGoalMet) cellClass = 'cal-success';
                }

                let isToday = currentDay.getTime() === today.getTime() ? 'cal-today' : '';
                
                // Formata o nome para passar para a função ao clicar (ex: 15 de abril)
                let fullDateName = currentDay.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' });

                grid.innerHTML += `
                    <div class="cal-cell ${cellClass} ${isToday}" onclick="showModalDayInfo('${fullDateName}', ${intake})">
                        ${i}
                    </div>
                `;
            }
        }

        function showModalDayInfo(dateName, intake) {
            const infoDiv = document.getElementById('modal-day-info');
            
            if(intake === 0) {
                infoDiv.innerText = `${dateName}: Nenhum registro.`;
                infoDiv.style.color = '#7f8c8d';
            } else if (intake >= goal) {
                infoDiv.innerText = `🎉 ${dateName}: ${intake}ml (Meta batida!)`;
                infoDiv.style.color = '#2ecc71';
            } else {
                infoDiv.innerText = `${dateName}: ${intake}ml consumidos.`;
                infoDiv.style.color = '#e74c3c';
            }
        }

        // Inicia o App
        loadData();
    </script>
</body>
</html>

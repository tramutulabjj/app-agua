<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Água Diária</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAhMHXKPknVmLv02EBLqG7E-f7Eekv2ghw", authDomain: "app-agua-2.firebaseapp.com", projectId: "app-agua-2", storageBucket: "app-agua-2.firebasestorage.app", messagingSenderId: "1087972192648", appId: "1:1087972192648:web:de80b2e1e32643c71e4a3d" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <style>
        :root { --primary-color: #5dade2; --bg-color: #1a1a2e; --container-bg: #16213e; --text-color: #e9e9e9; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .container { background-color: var(--container-bg); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; }
        #login-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #2c3e50; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .day-cell.done { background: #2ecc71; color: white; }
        button { padding: 10px; border: none; border-radius: 8px; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--container-bg); padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>💧 Minha Água</h1>
    <button onclick="auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())">Entrar com Google</button>
</div>

<div class="container" id="app-container">
    <h1>💧 Minha Água</h1>
    <button style="font-size: 10px; margin-bottom: 10px;" onclick="auth.signOut()">Sair da Conta</button>
    <div style="height:20px; background:#444; border-radius:10px; margin:10px 0;"><div id="bar" style="height:100%; width:0%; background:var(--primary-color); border-radius:10px;"></div></div>
    <h2 id="display-meta">0 / 4000 ml</h2>
    
    <div id="logs" style="font-size: 12px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; margin: 10px 0;">Histórico de hoje:</div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
        <button onclick="addWater(150)">+150ml</button><button onclick="addWater(250)">+250ml</button>
        <button onclick="addWater(500)">+500ml</button><button onclick="addWater(1000)">+1L</button>
        <button style="grid-column: span 2; background:#e74c3c;" onclick="undoLast()">🔙 Desfazer</button>
    </div>

    <h3>Calendário</h3>
    <div class="cal-grid" id="calendar"></div>

    <button style="width:100%; margin-top:15px;" onclick="document.getElementById('modal-meta').style.display='flex'">⚙️ Configurar Meta</button>
</div>

<div id="modal-meta" class="modal"><div class="modal-content">
    <h3>Meta Diária</h3><input type="number" id="input-meta" placeholder="Meta em ml">
    <button onclick="salvarMeta()">Salvar</button>
</div></div>

<div id="modal-day" class="modal"><div class="modal-content">
    <h3 id="day-title">Detalhes</h3><div id="day-details" style="margin: 10px 0;"></div>
    <button onclick="document.getElementById('modal-day').style.display='none'">Fechar</button>
</div></div>

<script>
    let goal = 4000;
    let logs = [];
    let userId = null;

    auth.onAuthStateChanged(user => {
        if (user) {
            userId = user.uid;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            monitorarDados();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function monitorarDados() {
        db.collection("users").doc(userId).onSnapshot(doc => {
            if (doc.exists) { logs = doc.data().logs || []; goal = doc.data().goal || 4000; }
            atualizarUI();
        });
    }

    function addWater(ml) {
        const agora = new Date();
        logs.push({ ml, time: agora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), date: agora.toDateString() });
        db.collection("users").doc(userId).set({ logs, goal });
    }

    function undoLast() { logs.pop(); db.collection("users").doc(userId).set({ logs, goal }); }

    function atualizarUI() {
        const today = new Date().toDateString();
        const total = logs.filter(x => x.date === today).reduce((a,b) => a + b.ml, 0);
        document.getElementById('display-meta').innerText = `${total} / ${goal} ml`;
        document.getElementById('bar').style.width = Math.min((total/goal)*100, 100) + '%';
        document.getElementById('logs').innerHTML = logs.filter(x => x.date === today).map(x => `<div>${x.time} - ${x.ml}ml</div>`).join('');
        
        const cal = document.getElementById('calendar'); cal.innerHTML = '';
        for(let i=6; i>=0; i--) {
            let d = new Date(); d.setDate(d.getDate() - i);
            let dateStr = d.toDateString();
            let totalD = logs.filter(x => x.date === dateStr).reduce((a,b) => a + b.ml, 0);
            let div = document.createElement('div');
            div.className = 'day-cell ' + (totalD >= goal ? 'done' : '');
            div.innerText = d.getDate();
            div.onclick = () => verDia(dateStr);
            cal.appendChild(div);
        }
    }

    function verDia(dateStr) {
        document.getElementById('day-title').innerText = dateStr;
        document.getElementById('day-details').innerHTML = logs.filter(x => x.date === dateStr).map(x => `<div>${x.time} - ${x.ml}ml</div>`).join('') || "Sem registros.";
        document.getElementById('modal-day').style.display = 'flex';
    }

    function salvarMeta() {
        goal = parseInt(document.getElementById('input-meta').value);
        db.collection("users").doc(userId).set({ logs, goal });
        document.getElementById('modal-meta').style.display = 'none';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Água Diária</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhMHXKPknVmLv02EBLqG7E-f7Eekv2ghw",
            authDomain: "app-agua-2.firebaseapp.com",
            projectId: "app-agua-2",
            storageBucket: "app-agua-2.firebasestorage.app",
            messagingSenderId: "1087972192648",
            appId: "1:1087972192648:web:de80b2e1e32643c71e4a3d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
    </script>

    <style>
        :root { --primary-color: #5dade2; --bg-color: #1a1a2e; --container-bg: #16213e; --text-color: #e9e9e9; --border-color: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .container { background-color: var(--container-bg); padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .chart-box { display: flex; align-items: flex-end; justify-content: space-around; height: 80px; margin: 15px 0; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; }
        .bar { width: 30px; background: var(--primary-color); border-radius: 5px 5px 0 0; transition: height 0.5s; }
        .log-list { font-size: 12px; margin: 10px 0; max-height: 100px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
        button { padding: 10px; border: none; border-radius: 8px; background: var(--primary-color); color: white; font-weight: bold; cursor: pointer; }
        .modal { display: none; position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--container-bg); padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #2c3e50; color: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>💧 Minha Água</h1>
    <p>Faça login para sincronizar seus dados</p><br>
    <button onclick="loginGoogle()">Entrar com Google</button>
</div>

<div class="container" id="app-container">
    <h1>💧 Minha Água</h1>
    <button style="font-size: 10px; margin-bottom: 10px;" onclick="auth.signOut()">Sair da Conta</button>
    <div id="progresso-bar" style="height:20px; background:#444; border-radius:10px; margin:10px 0;"><div id="bar" style="height:100%; width:0%; background:var(--primary-color); border-radius:10px;"></div></div>
    <h2 id="display-meta">0 / 4000 ml</h2>
    <div class="chart-box" id="chart"></div>
    <div class="log-list" id="logs">Histórico de hoje:</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
        <button onclick="addWater(150)">+150ml</button>
        <button onclick="addWater(250)">+250ml</button>
        <button onclick="addWater(500)">+500ml</button>
        <button onclick="addWater(1000)">+1L</button>
        <button style="grid-column: span 2; background:#e74c3c;" onclick="undoLast()">🔙 Desfazer Última</button>
    </div>
    <button style="width:100%; margin-top:10px;" onclick="document.getElementById('modal').style.display='flex'">⚙️ Configurar Meta</button>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Meta Diária</h3>
        <input type="number" id="input-peso" placeholder="Seu peso (kg)" oninput="sugerirMeta()">
        <p>Meta sugerida: <b id="sugestao">0</b>ml</p>
        <input type="number" id="input-meta" placeholder="Meta manual">
        <button onclick="salvarMeta()">Salvar</button>
    </div>
</div>

<script>
    let goal = 4000;
    let logs = [];
    let userId = null;

    auth.onAuthStateChanged(user => {
        if (user) {
            userId = user.uid;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            monitorarDados();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider);
    }

    function monitorarDados() {
        // Usa onSnapshot para escutar em tempo real (se o PC mudar, o celular vê)
        db.collection("users").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                logs = doc.data().logs || [];
                goal = doc.data().goal || 4000;
                atualizarUI();
            } else {
                // Cria documento se não existir
                db.collection("users").doc(userId).set({ logs: [], goal: 4000 });
            }
        });
    }

    function addWater(ml) {
        const agora = new Date();
        logs.push({ ml, time: agora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), date: agora.toDateString() });
        salvarNoFirebase();
        if(getTotal() >= goal) confetti();
    }

    function undoLast() {
        logs.pop();
        salvarNoFirebase();
    }

    function getTotal() {
        return logs.filter(x => x.date === new Date().toDateString()).reduce((a,b) => a + b.ml, 0);
    }

    function salvarNoFirebase() {
        db.collection("users").doc(userId).set({ logs, goal });
    }

    function salvarMeta() {
        goal = document.getElementById('input-meta').value || document.getElementById('sugestao').innerText;
        document.getElementById('modal').style.display = 'none';
        salvarNoFirebase();
    }

    function atualizarUI() {
        const total = getTotal();
        document.getElementById('display-meta').innerText = `${total} / ${goal} ml`;
        document.getElementById('bar').style.width = Math.min((total/goal)*100, 100) + '%';
        document.getElementById('logs').innerHTML = logs.filter(x => x.date === new Date().toDateString()).map(x => `<div>${x.time} - ${x.ml}ml</div>`).join('');
        document.getElementById('chart').innerHTML = `<div class="bar" style="height:${Math.min((total/goal)*100, 100)}%"></div>`;
    }

    function sugerirMeta() {
        document.getElementById('sugestao').innerText = document.getElementById('input-peso').value * 35;
    }
</script>
</body>
</html>
